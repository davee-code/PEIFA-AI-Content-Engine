<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PEIFA AI Content Engine</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌾</text></svg>" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { -webkit-font-smoothing: antialiased; }
    @keyframes blink  { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    @keyframes pulse  { 0%,100%{opacity:1} 50%{opacity:0.4} }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(200,146,42,0.35); border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useCallback, useEffect } = React;

    const DAYS = [
      { day:1,  theme:"Community Pride",          platform:"Facebook",          format:"Photo",         goal:"Awareness" },
      { day:2,  theme:"Did You Know?",             platform:"Instagram",         format:"Carousel",      goal:"Education" },
      { day:3,  theme:"What's Growing",            platform:"Instagram",         format:"Reel/Video",    goal:"Engagement" },
      { day:4,  theme:"Policy Spotlight",          platform:"LinkedIn",          format:"Infographic",   goal:"Advocacy" },
      { day:5,  theme:"Local Food Friday",         platform:"Facebook + IG",     format:"Photo",         goal:"Awareness" },
      { day:6,  theme:"Weekend Farm Walk",         platform:"Instagram Stories", format:"Story Series",  goal:"Engagement" },
      { day:7,  theme:"Community Q&A",             platform:"Facebook",          format:"Post + Poll",   goal:"Engagement" },
      { day:8,  theme:"Young Farmer Feature",      platform:"Instagram",         format:"Photo",         goal:"Inspiration" },
      { day:9,  theme:"Soil & Science",            platform:"LinkedIn",          format:"Infographic",   goal:"Education" },
      { day:10, theme:"Throwback PEI Farm",        platform:"Facebook",          format:"Photo",         goal:"Nostalgia" },
      { day:11, theme:"Advocacy Thread",           platform:"X (Twitter)",       format:"Thread",        goal:"Advocacy" },
      { day:12, theme:"Recipe Friday",             platform:"Instagram",         format:"Carousel",      goal:"Awareness" },
      { day:13, theme:"Farmers Market Spotlight",  platform:"Facebook + IG",     format:"Photo",         goal:"Community" },
      { day:14, theme:"Weekly Wrap-Up",            platform:"All Platforms",     format:"Graphic",       goal:"Engagement" },
      { day:15, theme:"Farm Fact Monday",          platform:"Instagram",         format:"Infographic",   goal:"Education" },
      { day:16, theme:"Meet the Farmer",           platform:"Facebook",          format:"Photo + Story", goal:"Community" },
      { day:17, theme:"Climate & Agriculture",     platform:"LinkedIn",          format:"Article",       goal:"Advocacy" },
      { day:18, theme:"Career Thursday",           platform:"IG + LinkedIn",     format:"Carousel",      goal:"Career Awareness" },
      { day:19, theme:"Local Food Friday",         platform:"Facebook",          format:"Photo",         goal:"Awareness" },
      { day:20, theme:"Behind the Fence",          platform:"Instagram",         format:"Reel",          goal:"Engagement" },
      { day:21, theme:"Community Poll",            platform:"Facebook + IG",     format:"Poll + Story",  goal:"Engagement" },
      { day:22, theme:"Harvest Countdown",         platform:"Instagram",         format:"Photo",         goal:"Seasonal" },
      { day:23, theme:"By the Numbers",            platform:"LinkedIn",          format:"Infographic",   goal:"Education" },
      { day:24, theme:"Wordless Wednesday",        platform:"Instagram",         format:"Photo",         goal:"Engagement" },
      { day:25, theme:"Policy Win",                platform:"X + LinkedIn",      format:"Announcement",  goal:"Advocacy" },
      { day:26, theme:"Taste of PEI",              platform:"Facebook + IG",     format:"Reel/Video",    goal:"Awareness" },
      { day:27, theme:"Farm to Table Saturday",    platform:"Instagram",         format:"Carousel",      goal:"Education" },
      { day:28, theme:"Week in Review",            platform:"All Platforms",     format:"Graphic",       goal:"Engagement" },
      { day:29, theme:"Looking Ahead",             platform:"LinkedIn",          format:"Article",       goal:"Inspiration" },
      { day:30, theme:"Thank You PEI",             platform:"All Platforms",     format:"Photo Collage", goal:"Community" },
    ];

    const GOAL_COLORS = {
      Awareness:"#C8922A", Education:"#1A6E6E", Engagement:"#5B4A8A",
      Advocacy:"#9B3A1A", Community:"#2D6A2D", Inspiration:"#1A3A6E",
      Nostalgia:"#8A6A2A", Seasonal:"#4A8A2A", "Career Awareness":"#6E1A6E",
    };

    function getPlatformColor(p) {
      if (p.includes("LinkedIn"))  return "#0A66C2";
      if (p.includes("Instagram") || p.includes("IG")) return "#E1306C";
      if (p.includes("Facebook"))  return "#1877F2";
      if (p.includes("Twitter") || p.includes("X (")) return "#555";
      return "#2D6A2D";
    }

    const SYS = "You are a senior marketing specialist for the PEI Federation of Agriculture (PEIFA) on Prince Edward Island, Canada. Your outputs are professional, warm, and ready to use. Be specific, practical, and Island-proud in everything you write. Format responses clearly with headers and sections.";

    const LAYERS = [
      {
        id:"L1", label:"Strategy", icon:"🗺", color:"#5B4A8A",
        desc:"Full content brief for this post",
        prompt: d => `Create a detailed content brief for:\n- Day: ${d.day} of 30 | Theme: ${d.theme}\n- Platform: ${d.platform} | Format: ${d.format} | Goal: ${d.goal}\n\nBRAND VOICE: Friendly, warm, proud of PEI agriculture, educational but accessible, community-first, farmer-first. Never corporate.\n\nReturn a structured brief:\n1. CORE MESSAGE (1 sentence takeaway)\n2. PRIMARY AUDIENCE (which segment?)\n3. EMOTIONAL HOOK (what feeling to create?)\n4. KEY INFORMATION POINTS (3-5 facts or story angles)\n5. CALL-TO-ACTION (specific action)\n6. PLATFORM NOTES (tips for ${d.platform})\n7. HASHTAG CLUSTER (5 tags, always include #PEIAgriculture)`
      },
      {
        id:"L2", label:"Copywriting", icon:"✍️", color:"#1A6E6E",
        desc:"Publish-ready caption + 2 variants",
        prompt: d => `Write a publish-ready social media caption for:\n- Day: ${d.day} | Theme: ${d.theme}\n- Platform: ${d.platform} | Format: ${d.format} | Goal: ${d.goal}\n\nBRAND VOICE: Warm, friendly, community-first. Farmer-first perspective. Never corporate. Light humour when appropriate.\n\nWRITE:\n1. HOOK (first 1-2 lines - must stop the scroll)\n2. BODY (3-6 lines - story, facts, or emotion)\n3. CALL TO ACTION (1 specific line)\n4. HASHTAGS (5 tags including #PEIAgriculture)\n\nThen write:\n- VERSION A: More emotional / story-driven\n- VERSION B: More educational / fact-forward\n\nUnder 220 words for Facebook/Instagram. Under 280 characters for X/Twitter.`
      },
      {
        id:"L3", label:"Visual Design", icon:"🎨", color:"#9B3A1A",
        desc:"AI image prompts & visual brief",
        prompt: d => `Create a complete visual content package for:\n- Day: ${d.day} | Theme: ${d.theme}\n- Platform: ${d.platform} | Format: ${d.format}\n\nPEIFA VISUAL IDENTITY: Deep greens, harvest gold, red PEI soil, clear blue skies. Authentic documentary-style photography. Proud, hopeful, community-focused. No stock photo clichés.\n\nDELIVER:\n1. PRIMARY AI IMAGE PROMPT (for Midjourney/DALL-E/Adobe Firefly)\n   Format: [Subject + Action], [Setting], [Lighting], [Camera Style], [Mood], [Colours], [Technical Specs]\n2. ALTERNATIVE PROMPT (different angle if first doesn't work)\n3. CANVA GRAPHIC BRIEF (background, text overlay headline + subtext, colours: PEIFA green #2D6A2D and gold #C8922A)\n4. FORMAT SPECS (recommended dimensions/aspect ratio for ${d.platform})\n5. ALT-TEXT (1-2 sentences describing the visual for accessibility)`
      },
      {
        id:"L4", label:"Edit & Review", icon:"✅", color:"#2D6A2D",
        desc:"Scored critique + improved draft",
        prompt: d => `For Day ${d.day} - Theme: ${d.theme} | Platform: ${d.platform} | Goal: ${d.goal}\n\nFirst generate a strong draft caption for this post, then immediately critique and improve it.\n\nSCORE each dimension 1-10:\n1. HOOK STRENGTH - Does the first line stop scrolling?\n2. CLARITY - Instantly understandable?\n3. BRAND VOICE - Warm, authentic, farmer-first?\n4. CTA EFFECTIVENESS - Clear and motivating?\n5. HASHTAG RELEVANCE - Specific and well-matched?\n6. PLATFORM FIT - Right length and tone for ${d.platform}?\n\nTHEN PROVIDE:\n- IMPROVED VERSION (full rewrite with key changes noted)\n- TOP 3 CHANGES MADE (what was fixed and why)\n- OVERALL GRADE (A-F) with one-line summary`
      },
      {
        id:"L5", label:"Scheduling", icon:"📅", color:"#1A3A6E",
        desc:"Multi-platform publishing package",
        prompt: d => `Prepare a complete publishing package for:\n- Day: ${d.day} | Theme: ${d.theme}\n- Platform: ${d.platform} | Format: ${d.format} | Goal: ${d.goal}\n\nFOR EACH PLATFORM (Facebook, Instagram, LinkedIn, X/Twitter), provide:\n\n1. ADAPTED CAPTION\n   - Facebook: conversational, up to 250 words\n   - Instagram: visual-first, emojis OK, max 150 words, hashtags at end\n   - LinkedIn: professional, insight-led, 100-200 words\n   - X/Twitter: under 270 characters, punchy, max 1 hashtag\n\n2. PUBLISHING METADATA\n   - Best post time (Atlantic Time)\n   - Content category tag\n   - Alt-text for image (1-2 sentences)\n   - Link in bio update needed?\n\n3. ENGAGEMENT PREP\n   - 2 seed comments to spark conversation\n   - 1 question to pin as first Instagram comment\n   - Any accounts worth tagging?`
      },
      {
        id:"L6", label:"Engagement", icon:"💬", color:"#7A1A3A",
        desc:"Community response library",
        prompt: d => `Generate a RESPONSE LIBRARY for:\n- Day: ${d.day} | Theme: ${d.theme} | Platform: ${d.platform} | Goal: ${d.goal}\n\nWrite ready-to-use replies for:\n\n1. POSITIVE ENGAGEMENT ("Love this!" / "Amazing!")\n   - 3 warm, specific response options\n\n2. LOCAL FOOD QUESTIONS ("Where can I buy PEI produce?")\n   - 3 helpful responses with resource suggestions\n\n3. FARMING QUESTIONS ("How does this work?" / "How do I start?")\n   - 3 educational response options\n\n4. SHARING PERSONAL STORIES ("My grandfather farmed PEI!")\n   - 3 community-bonding response options\n\n5. CRITICAL OR SCEPTICAL COMMENTS\n   - 2 calm, constructive de-escalation responses\n\nRULES: Always warm, never defensive. Max 3 sentences per response. End with a question where natural.`
      },
    ];

    function rgb(hex) {
      return `${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)}`;
    }

    function Badge({ label, color }) {
      return (
        <span style={{display:"inline-block",padding:"2px 8px",borderRadius:4,background:`rgba(${rgb(color)},0.18)`,border:`1px solid rgba(${rgb(color)},0.35)`,color,fontSize:10,fontFamily:"monospace"}}>
          {label}
        </span>
      );
    }

    // ── API Key Modal ─────────────────────────────────────────────────────────
    function ApiKeyModal({ onSave }) {
      const [key, setKey] = useState("");
      const [err, setErr] = useState("");
      const [busy, setBusy] = useState(false);

      async function save() {
        const k = key.trim();
        if (!k) { setErr("Please enter your Groq API key."); return; }
        if (!k.startsWith("gsk_")) { setErr('Groq keys start with "gsk_" — please check you copied the right key.'); return; }
        setBusy(true); setErr("");
        try {
          const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: { "Content-Type":"application/json", "Authorization":`Bearer ${k}` },
            body: JSON.stringify({ model:"llama-3.3-70b-versatile", max_tokens:5, messages:[{role:"user",content:"Hi"}] })
          });
          const data = await r.json();
          if (data.error) { setErr(data.error.message || "Invalid key — please check and try again."); setBusy(false); return; }
        } catch { /* allow through on network issues */ }
        onSave(k); setBusy(false);
      }

      return (
        <div style={{position:"fixed",inset:0,zIndex:1000,background:"rgba(0,0,0,0.88)",backdropFilter:"blur(8px)",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{background:"linear-gradient(160deg,#0f1f0f,#1a2f1a)",border:"1px solid rgba(200,146,42,0.35)",borderRadius:16,padding:"40px 36px",maxWidth:480,width:"100%",boxShadow:"0 32px 80px rgba(0,0,0,0.6)"}}>
            <div style={{fontSize:40,marginBottom:16}}>🔑</div>
            <h2 style={{fontSize:22,fontFamily:"Georgia,serif",color:"#f0ebe0",marginBottom:8,fontWeight:"normal"}}>
              Connect Your <span style={{color:"#C8922A"}}>Free Groq API Key</span>
            </h2>
            <p style={{fontSize:13,color:"rgba(240,235,224,0.55)",lineHeight:1.7,marginBottom:20}}>
              Groq is <strong style={{color:"#C8922A"}}>completely free</strong>, works in Canada, and is extremely fast. No credit card needed.
            </p>

            <div style={{background:"rgba(200,146,42,0.08)",border:"1px solid rgba(200,146,42,0.2)",borderRadius:8,padding:"14px 16px",marginBottom:20}}>
              {[
                ["1","Go to","console.groq.com"],
                ["2","Sign up free with Google or email",""],
                ["3","Click","API Keys → Create API Key"],
                ["4","Copy the key (starts with gsk_) and paste below",""],
              ].map(([n,a,b]) => (
                <div key={n} style={{display:"flex",gap:10,marginBottom:n==="4"?0:8,alignItems:"flex-start"}}>
                  <span style={{width:20,height:20,borderRadius:"50%",background:"#2D6A2D",display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:"bold",color:"#fff",flexShrink:0,marginTop:1}}>{n}</span>
                  <span style={{fontSize:13,color:"rgba(240,235,224,0.65)",lineHeight:1.4}}>
                    {a} {b && <strong style={{color:"#C8922A"}}>{b}</strong>}
                  </span>
                </div>
              ))}
            </div>

            <div style={{fontSize:11,letterSpacing:"0.12em",color:"rgba(200,146,42,0.7)",textTransform:"uppercase",marginBottom:6}}>Your Groq API Key</div>
            <input
              type="password" placeholder="gsk_..." value={key}
              onChange={e => setKey(e.target.value)}
              onKeyDown={e => e.key === "Enter" && save()}
              autoFocus
              style={{width:"100%",padding:"12px 14px",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:8,color:"#f0ebe0",fontSize:13,fontFamily:"monospace",outline:"none"}}
            />

            {err && (
              <div style={{fontSize:12,color:"#f08080",marginTop:10,padding:"8px 12px",background:"rgba(180,40,40,0.15)",border:"1px solid rgba(180,40,40,0.3)",borderRadius:6}}>
                ⚠ {err}
              </div>
            )}

            <button onClick={save} disabled={busy}
              style={{width:"100%",marginTop:16,padding:13,background:"linear-gradient(135deg,#2D6A2D,#3d8a3d)",border:"none",borderRadius:8,color:"#fff",fontSize:14,fontWeight:"bold",letterSpacing:"0.08em",fontFamily:"Georgia,serif",cursor:busy?"not-allowed":"pointer",opacity:busy?0.7:1}}>
              {busy ? "⏳ Verifying…" : "▶ Launch Content Engine — Free"}
            </button>

            <div style={{marginTop:14,padding:"10px 14px",background:"rgba(45,106,45,0.08)",border:"1px solid rgba(45,106,45,0.2)",borderRadius:8,fontSize:11,color:"rgba(109,191,109,0.7)",lineHeight:1.6}}>
              ✓ Free forever &nbsp;·&nbsp; Works in Canada &nbsp;·&nbsp; No credit card &nbsp;·&nbsp; Key stored in session only
            </div>
          </div>
        </div>
      );
    }

    // ── Main App ──────────────────────────────────────────────────────────────
    function App() {
      const [apiKey, setApiKey]     = useState(null);
      const [selDay, setSelDay]     = useState(null);
      const [selLayer, setSelLayer] = useState(null);
      const [output, setOutput]     = useState("");
      const [loading, setLoading]   = useState(false);
      const [error, setError]       = useState("");
      const [history, setHistory]   = useState([]);
      const [view, setView]         = useState("generator");
      const [copied, setCopied]     = useState(false);
      const outRef   = useRef(null);
      const abortRef = useRef(null);

      const day   = selDay   !== null ? DAYS[selDay]     : null;
      const layer = selLayer !== null ? LAYERS[selLayer] : null;
      const canRun = selDay !== null && selLayer !== null && !loading;

      useEffect(() => {
        if (outRef.current) outRef.current.scrollTop = outRef.current.scrollHeight;
      }, [output]);

      const run = useCallback(async () => {
        if (!canRun || !apiKey) return;
        setOutput(""); setError(""); setLoading(true);
        if (abortRef.current) abortRef.current.abort();
        abortRef.current = new AbortController();

        try {
          const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            signal: abortRef.current.signal,
            headers: {
              "Content-Type": "application/json",
              "Authorization": `Bearer ${apiKey}`,
            },
            body: JSON.stringify({
              model: "llama-3.3-70b-versatile",
              max_tokens: 1500,
              stream: true,
              messages: [
                { role: "system", content: SYS },
                { role: "user",   content: layer.prompt(day) },
              ],
            }),
          });

          if (!res.ok) {
            const e = await res.json().catch(() => ({}));
            setError(e?.error?.message || `API error ${res.status}`);
            setLoading(false); return;
          }

          const reader  = res.body.getReader();
          const decoder = new TextDecoder();
          let full = "";

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            const lines = decoder.decode(value).split("\n").filter(l => l.startsWith("data: ") && l !== "data: [DONE]");
            for (const line of lines) {
              try {
                const data  = JSON.parse(line.slice(6));
                const token = data?.choices?.[0]?.delta?.content;
                if (token) { full += token; setOutput(full); }
              } catch {}
            }
          }

          if (full) {
            setHistory(h => [{
              id: Date.now(),
              day: day.day, theme: day.theme, platform: day.platform,
              layer: layer.label, layerIcon: layer.icon, layerColor: layer.color,
              output: full,
              ts: new Date().toLocaleString("en-CA", { hour:"2-digit", minute:"2-digit", month:"short", day:"numeric" }),
            }, ...h].slice(0, 30));
          }
        } catch (e) {
          if (e.name !== "AbortError") setError("Generation failed — check your API key and try again.");
        } finally {
          setLoading(false);
        }
      }, [canRun, apiKey, day, layer]);

      function copy() {
        navigator.clipboard.writeText(output);
        setCopied(true); setTimeout(() => setCopied(false), 2000);
      }

      const C = { G:"#2D6A2D", O:"#C8922A" };
      const navS = a => ({
        padding:"5px 14px", borderRadius:20, fontSize:11,
        fontFamily:"Georgia,serif", letterSpacing:"0.06em",
        border: a ? "1px solid #C8922A" : "1px solid rgba(200,146,42,0.2)",
        background: a ? "rgba(200,146,42,0.12)" : "transparent",
        color: a ? "#C8922A" : "rgba(240,235,224,0.5)", cursor:"pointer",
      });

      return (
        <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0a1a0a,#152015,#0a1208)",fontFamily:"Georgia,'Times New Roman',serif",color:"#f0ebe0"}}>
          {!apiKey && <ApiKeyModal onSave={setApiKey} />}

          {/* ── Header ── */}
          <header style={{borderBottom:"1px solid rgba(200,146,42,0.25)",padding:"14px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100,background:"rgba(10,26,10,0.92)",backdropFilter:"blur(12px)"}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <div style={{width:34,height:34,background:"linear-gradient(135deg,#2D6A2D,#C8922A)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17}}>🌾</div>
              <div>
                <div style={{fontSize:12,fontWeight:"bold",letterSpacing:"0.14em",color:C.O,textTransform:"uppercase"}}>PEIFA</div>
                <div style={{display:"flex",alignItems:"center",gap:5}}>
                  <div style={{fontSize:10,color:"rgba(240,235,224,0.4)",letterSpacing:"0.06em"}}>AI Content Engine</div>
                  <span style={{fontSize:9,padding:"1px 6px",borderRadius:3,background:"rgba(45,106,45,0.3)",border:"1px solid rgba(45,106,45,0.5)",color:"#6dbf6d"}}>FREE</span>
                </div>
              </div>
            </div>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              {[["generator","Generator"],["history",`History${history.length ? ` (${history.length})` : ""}`],["about","About"]].map(([v,l]) => (
                <button key={v} style={navS(view===v)} onClick={() => setView(v)}>{l}</button>
              ))}
              {apiKey && (
                <button style={{padding:"5px 10px",borderRadius:20,fontSize:10,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.04)",color:"rgba(240,235,224,0.4)",cursor:"pointer",fontFamily:"Georgia,serif"}} onClick={() => setApiKey(null)}>
                  🔑 key set
                </button>
              )}
            </div>
          </header>

          <main style={{padding:"24px 24px 48px",maxWidth:1400,margin:"0 auto"}}>

            {/* ── GENERATOR ── */}
            {view === "generator" && (
              <div style={{animation:"fadeIn 0.35s ease"}}>

                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginTop:8}}>

                  {/* Day picker */}
                  <div style={{background:"rgba(255,255,255,0.025)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:12,padding:16}}>
                    <div style={{fontSize:10,letterSpacing:"0.16em",color:"rgba(200,146,42,0.6)",textTransform:"uppercase",marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
                      <span style={{width:18,height:18,borderRadius:"50%",background:C.G,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:"bold",color:"#fff"}}>1</span>
                      Select Campaign Day
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(105px,1fr))",gap:5,maxHeight:255,overflowY:"auto",paddingRight:4}}>
                      {DAYS.map((d, i) => {
                        const gc = GOAL_COLORS[d.goal] || C.G;
                        const sel = selDay === i;
                        return (
                          <div key={i}
                            onClick={() => { setSelDay(i); setOutput(""); setError(""); }}
                            style={{padding:"7px 9px",borderRadius:7,border:`1px solid ${sel ? gc : "rgba(255,255,255,0.08)"}`,background:sel ? `rgba(${rgb(gc)},0.12)` : "rgba(255,255,255,0.03)",cursor:"pointer",transition:"all 0.15s"}}
                            onMouseEnter={e => { if (!sel) { e.currentTarget.style.borderColor="rgba(200,146,42,0.4)"; e.currentTarget.style.background="rgba(255,255,255,0.06)"; }}}
                            onMouseLeave={e => { if (!sel) { e.currentTarget.style.borderColor="rgba(255,255,255,0.08)"; e.currentTarget.style.background="rgba(255,255,255,0.03)"; }}}
                          >
                            <div style={{fontSize:9,color:"rgba(200,146,42,0.7)",letterSpacing:"0.1em"}}>DAY {d.day}</div>
                            <div style={{fontSize:11,color:"#f0ebe0",fontWeight:"bold",lineHeight:1.3,margin:"2px 0"}}>{d.theme}</div>
                            <div style={{fontSize:9,color:"rgba(240,235,224,0.4)"}}>{d.platform}</div>
                          </div>
                        );
                      })}
                    </div>
                  </div>

                  {/* Layer picker */}
                  <div style={{background:"rgba(255,255,255,0.025)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:12,padding:16}}>
                    <div style={{fontSize:10,letterSpacing:"0.16em",color:"rgba(200,146,42,0.6)",textTransform:"uppercase",marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
                      <span style={{width:18,height:18,borderRadius:"50%",background:C.O,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:"bold",color:"#fff"}}>2</span>
                      Choose Prompt Layer
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
                      {LAYERS.map((l, i) => {
                        const sel = selLayer === i;
                        return (
                          <div key={i}
                            onClick={() => { setSelLayer(i); setOutput(""); setError(""); }}
                            style={{padding:11,borderRadius:8,border:`1px solid ${sel ? l.color : "rgba(255,255,255,0.08)"}`,background:sel ? `rgba(${rgb(l.color)},0.15)` : "rgba(255,255,255,0.03)",cursor:"pointer",transition:"all 0.15s"}}
                            onMouseEnter={e => e.currentTarget.style.transform="translateY(-1px)"}
                            onMouseLeave={e => e.currentTarget.style.transform="translateY(0)"}
                          >
                            <div style={{fontSize:20,marginBottom:5}}>{l.icon}</div>
                            <div style={{fontSize:9,color:l.color,letterSpacing:"0.15em",fontFamily:"monospace"}}>{l.id}</div>
                            <div style={{fontSize:12,fontWeight:"bold",color:"#f0ebe0",margin:"2px 0"}}>{l.label}</div>
                            <div style={{fontSize:10,color:"rgba(240,235,224,0.4)",lineHeight:1.4}}>{l.desc}</div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                </div>

                {/* Sidebar + Output */}
                <div style={{display:"grid",gridTemplateColumns:"220px 1fr",gap:12,marginTop:12,alignItems:"start"}}>

                  {/* Sidebar */}
                  <div style={{background:"rgba(255,255,255,0.025)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:12,padding:14}}>
                    <div style={{fontSize:9,letterSpacing:"0.18em",color:"rgba(200,146,42,0.55)",textTransform:"uppercase",marginBottom:12}}>Configuration</div>

                    {day ? (
                      <>
                        {[["Day",`Day ${day.day} of 30`],["Theme",day.theme],["Format",day.format]].map(([l,v]) => (
                          <div key={l} style={{marginBottom:9}}>
                            <div style={{fontSize:9,color:"rgba(240,235,224,0.35)",marginBottom:2}}>{l}</div>
                            <div style={{fontSize:11,color:"#f0ebe0"}}>{v}</div>
                          </div>
                        ))}
                        <div style={{marginBottom:9}}>
                          <div style={{fontSize:9,color:"rgba(240,235,224,0.35)",marginBottom:4}}>Platform</div>
                          <Badge label={day.platform} color={getPlatformColor(day.platform)} />
                        </div>
                        <div style={{marginBottom:9}}>
                          <div style={{fontSize:9,color:"rgba(240,235,224,0.35)",marginBottom:4}}>Goal</div>
                          <Badge label={day.goal} color={GOAL_COLORS[day.goal] || C.G} />
                        </div>
                      </>
                    ) : (
                      <div style={{fontSize:11,color:"rgba(240,235,224,0.25)"}}>No day selected</div>
                    )}

                    <div style={{borderTop:"1px solid rgba(255,255,255,0.07)",margin:"12px 0"}} />

                    {layer ? (
                      <>
                        <div style={{marginBottom:8}}>
                          <div style={{fontSize:9,color:"rgba(240,235,224,0.35)",marginBottom:4}}>Layer</div>
                          <div style={{display:"flex",gap:6,alignItems:"center"}}>
                            <span>{layer.icon}</span>
                            <span style={{fontSize:11,color:layer.color,fontWeight:"bold"}}>{layer.id}: {layer.label}</span>
                          </div>
                        </div>
                        <div style={{fontSize:10,color:"rgba(240,235,224,0.4)",lineHeight:1.5}}>{layer.desc}</div>
                      </>
                    ) : (
                      <div style={{fontSize:11,color:"rgba(240,235,224,0.25)"}}>No layer selected</div>
                    )}

                    <button
                      disabled={!canRun} onClick={run}
                      onMouseEnter={e => { if (canRun) e.currentTarget.style.transform="translateY(-1px)"; }}
                      onMouseLeave={e => { e.currentTarget.style.transform="translateY(0)"; }}
                      style={{width:"100%",padding:11,borderRadius:8,border:"none",background:canRun ? `linear-gradient(135deg,${layer?.color||C.G},${layer?.color||C.G}bb)` : "rgba(255,255,255,0.05)",color:canRun?"#fff":"rgba(240,235,224,0.3)",fontSize:12,fontWeight:"bold",letterSpacing:"0.08em",cursor:canRun?"pointer":"not-allowed",transition:"all 0.2s",marginTop:12,fontFamily:"Georgia,serif"}}
                    >
                      {loading
                        ? <span style={{animation:"pulse 1s infinite"}}>● Generating…</span>
                        : canRun ? `▶ Run ${layer.label}` : "Select day + layer"}
                    </button>

                    {loading && (
                      <button onClick={() => { abortRef.current?.abort(); setLoading(false); }}
                        style={{width:"100%",marginTop:6,padding:8,borderRadius:8,border:"1px solid rgba(255,255,255,0.1)",background:"transparent",color:"rgba(240,235,224,0.4)",fontSize:11,cursor:"pointer",fontFamily:"Georgia,serif"}}>
                        ✕ Stop
                      </button>
                    )}
                    {output && !loading && (
                      <button onClick={() => { setOutput(""); setError(""); }}
                        style={{width:"100%",marginTop:6,padding:8,borderRadius:8,border:"1px solid rgba(255,255,255,0.1)",background:"transparent",color:"rgba(240,235,224,0.4)",fontSize:11,cursor:"pointer",fontFamily:"Georgia,serif"}}>
                        ✕ Clear
                      </button>
                    )}
                    {error && (
                      <div style={{marginTop:8,padding:"8px 10px",background:"rgba(180,40,40,0.12)",border:"1px solid rgba(180,40,40,0.3)",borderRadius:6,fontSize:11,color:"#f08080"}}>
                        ⚠ {error}
                      </div>
                    )}

                    <div style={{marginTop:14,padding:"8px 10px",background:"rgba(45,106,45,0.1)",border:"1px solid rgba(45,106,45,0.25)",borderRadius:6,fontSize:10,color:"rgba(109,191,109,0.8)",lineHeight:1.6}}>
                      ✓ Groq free tier<br/>Works in Canada<br/>No credit card needed
                    </div>
                  </div>

                  {/* Output panel */}
                  <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,overflow:"hidden",display:"flex",flexDirection:"column",minHeight:400}}>
                    <div style={{padding:"12px 16px",borderBottom:"1px solid rgba(255,255,255,0.07)",display:"flex",alignItems:"center",justifyContent:"space-between",background:"rgba(255,255,255,0.02)",flexShrink:0}}>
                      <div style={{fontSize:11,letterSpacing:"0.12em",color:"rgba(200,146,42,0.7)",textTransform:"uppercase"}}>
                        {loading
                          ? <span style={{color:layer?.color,animation:"pulse 1.5s infinite"}}>● GENERATING {layer?.label?.toUpperCase()}</span>
                          : output ? `${layer?.id} Output — Day ${day?.day}: ${day?.theme}` : "Output"}
                      </div>
                      {output && !loading && (
                        <button onClick={copy}
                          style={{padding:"4px 12px",borderRadius:4,border:`1px solid ${copied ? "#4CAF50" : "rgba(200,146,42,0.3)"}`,background:"transparent",color:copied?"#4CAF50":"#C8922A",fontSize:11,cursor:"pointer",fontFamily:"Georgia,serif"}}>
                          {copied ? "✓ Copied!" : "⎘ Copy"}
                        </button>
                      )}
                    </div>
                    <div ref={outRef}
                      style={{padding:20,flex:1,overflowY:"auto",fontSize:13,lineHeight:1.8,color:"#e0ddd4",whiteSpace:"pre-wrap",fontFamily:"Georgia,serif",minHeight:360,maxHeight:560}}>
                      {!output && !loading && (
                        <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:320,color:"rgba(240,235,224,0.2)",gap:14,textAlign:"center"}}>
                          <div style={{fontSize:44,opacity:0.6}}>{layer ? layer.icon : "🌾"}</div>
                          <div style={{fontSize:13,maxWidth:280,lineHeight:1.6}}>
                            {canRun
                              ? `Ready to generate ${layer.label} for Day ${day.day}: ${day.theme}. Click Run.`
                              : "Select a campaign day and a prompt layer, then click Run."}
                          </div>
                        </div>
                      )}
                      {output}
                      {loading && <span style={{display:"inline-block",width:2,height:"1em",background:layer?.color||C.G,marginLeft:2,animation:"blink 1s step-end infinite",verticalAlign:"text-bottom"}} />}
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* ── HISTORY ── */}
            {view === "history" && (
              <div style={{animation:"fadeIn 0.3s ease"}}>
                <div style={{fontSize:10,letterSpacing:"0.2em",color:"rgba(200,146,42,0.65)",textTransform:"uppercase",marginBottom:12,marginTop:8}}>Session History</div>
                {history.length === 0 ? (
                  <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:240,color:"rgba(240,235,224,0.2)",gap:12,textAlign:"center"}}>
                    <div style={{fontSize:44}}>📋</div>
                    <div style={{fontSize:13,maxWidth:260,lineHeight:1.6}}>No content generated yet. Run a prompt in the Generator.</div>
                  </div>
                ) : (
                  <div style={{display:"flex",flexDirection:"column",gap:8}}>
                    {history.map(h => (
                      <div key={h.id}
                        onClick={() => { setOutput(h.output); setView("generator"); }}
                        style={{padding:"14px 16px",background:"rgba(255,255,255,0.025)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:10,cursor:"pointer",transition:"border-color 0.15s"}}
                        onMouseEnter={e => e.currentTarget.style.borderColor="rgba(200,146,42,0.3)"}
                        onMouseLeave={e => e.currentTarget.style.borderColor="rgba(255,255,255,0.07)"}
                      >
                        <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:6,flexWrap:"wrap"}}>
                          <Badge label={`Day ${h.day}`} color={C.O} />
                          <Badge label={`${h.layerIcon} ${h.layer}`} color={h.layerColor} />
                          <Badge label={h.platform} color={getPlatformColor(h.platform)} />
                          <span style={{fontSize:10,color:"rgba(240,235,224,0.25)",marginLeft:"auto"}}>{h.ts}</span>
                        </div>
                        <div style={{fontSize:12,color:C.O,marginBottom:4,fontWeight:"bold"}}>{h.theme}</div>
                        <div style={{fontSize:12,color:"rgba(240,235,224,0.45)",lineHeight:1.5,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{h.output}</div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {/* ── ABOUT ── */}
            {view === "about" && (
              <div style={{animation:"fadeIn 0.3s ease",paddingTop:16}}>
                <div style={{background:"rgba(255,255,255,0.025)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:12,padding:"28px 32px",maxWidth:620,margin:"0 auto"}}>
                  <div style={{fontSize:36,marginBottom:12}}>🌾</div>
                  <h2 style={{fontSize:20,color:C.O,marginBottom:10,fontWeight:"normal",fontFamily:"Georgia,serif"}}>PEIFA AI Content Engine</h2>
                  <p style={{fontSize:13,color:"rgba(240,235,224,0.55)",lineHeight:1.8,marginBottom:16}}>
                    A 30-day social media automation tool for the PEI Federation of Agriculture. Powered by Groq — free, fast, and works in Canada.
                  </p>
                  <div style={{padding:"10px 14px",background:"rgba(45,106,45,0.1)",border:"1px solid rgba(45,106,45,0.25)",borderRadius:8,marginBottom:20,fontSize:12,color:"#6dbf6d",lineHeight:1.6}}>
                    ✓ Free forever &nbsp;·&nbsp; Works in Canada &nbsp;·&nbsp; No credit card &nbsp;·&nbsp; Get your key at console.groq.com
                  </div>
                  <div style={{fontSize:10,letterSpacing:"0.15em",color:"rgba(200,146,42,0.6)",textTransform:"uppercase",marginBottom:10}}>6 Prompt Layers</div>
                  {[
                    ["🗺","L1 Strategy","Full content brief per post"],
                    ["✍️","L2 Copywriting","Publish-ready caption + 2 variants"],
                    ["🎨","L3 Visual Design","AI image prompts + Canva brief"],
                    ["✅","L4 Edit & Review","Scored critique + improved rewrite"],
                    ["📅","L5 Scheduling","Multi-platform publishing package"],
                    ["💬","L6 Engagement","Community response library"],
                  ].map(([icon,name,desc]) => (
                    <div key={name} style={{display:"flex",gap:10,marginBottom:8,alignItems:"flex-start"}}>
                      <span style={{fontSize:16,flexShrink:0}}>{icon}</span>
                      <div>
                        <div style={{fontSize:12,color:"#f0ebe0",fontWeight:"bold"}}>{name}</div>
                        <div style={{fontSize:11,color:"rgba(240,235,224,0.4)"}}>{desc}</div>
                      </div>
                    </div>
                  ))}
                  <div style={{borderTop:"1px solid rgba(255,255,255,0.07)",margin:"20px 0"}} />
                  <p style={{fontSize:12,color:"rgba(240,235,224,0.4)",lineHeight:1.7}}>
                    Powered by Groq (llama-3.3-70b-versatile) · API key held in memory only · No backend · No data stored · Hosted free on GitHub Pages
                  </p>
                </div>
              </div>
            )}

          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
